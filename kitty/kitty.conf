# ==============================================================================
# Liquid Chrome - Kitty Terminal Configuration
# ==============================================================================
# A highly specific crossover between Frutiger Aero (eco-utopian, high-gloss,
# glass) and Gen X Soft Club (Y2K techno translucency, ambient wireframes,
# sterile minimalism, technical typography).
# ==============================================================================

# ------------------------------------------------------------------------------
# Typography & Rendering
# ------------------------------------------------------------------------------
# Uses sleek monospace font options aligned with technical typography protocol.
font_family      SF Mono Light
bold_font        SF Mono Semibold
italic_font      SF Mono Light Italic
bold_italic_font SF Mono Semibold Italic
font_size        13.0

# Surgical line-height adjustment to improve legibility and grid alignment
modify_font line_height 115%
modify_font cell_width 100%

# ------------------------------------------------------------------------------
# Translucency, Blur & Window Frame
# ------------------------------------------------------------------------------
# Set translucent base with strong backdrop blur simulating heavy frosted glass.
background_opacity 0.70
background_blur    48

# Hide OS-specific titlebars to maintain a sterile, borderless geometric aesthetic.
hide_window_decorations yes
macos_titlebar_color    #0B1021
macos_option_as_alt     yes
macos_quit_when_last_window_closed yes
macos_show_window_title_in none

# ------------------------------------------------------------------------------
# Window Layout, Margins & Borders
# ------------------------------------------------------------------------------
# Thin metal trim borders and precise spacing.
window_padding_width  12
window_margin_width   0
window_border_width   1px
active_border_color   #00FFFF
inactive_border_color #1F273D
draw_minimal_borders  yes

# ------------------------------------------------------------------------------
# Core Theme Colors (Liquid Chrome Base)
# ------------------------------------------------------------------------------
foreground            #FFFFFF
background            #0B1021
selection_foreground  #0B1021
selection_background  #00FFFF
url_color             #00FFFF
url_style             double

# Cursor Design (Bioluminescent Accent 1 Glow)
cursor            #00FFFF
cursor_text_color #0B1021
cursor_shape      beam
cursor_blink_interval 0.5

# ------------------------------------------------------------------------------
# Tab Bar Aesthetics
# ------------------------------------------------------------------------------
tab_bar_style           powerline
tab_powerline_style     angled
active_tab_foreground   #0B1021
active_tab_background   #00FFFF
active_tab_font_style   bold
inactive_tab_foreground #A0A5B5
inactive_tab_background #161C33
tab_bar_background      #0B1021

# ------------------------------------------------------------------------------
# Terminal Color Map (16 ANSI Colors)
# ------------------------------------------------------------------------------

# black & bright black
color0 #0B1021
color8 #505A70

# red & bright red (neon cyber pink/red)
color1 #FF2E93
color9 #FF5A85

# green & bright green (Bioluminescent Lime Green - Primary Accent 2)
color2  #39FF14
color10 #39FF14

# yellow & bright yellow (Bioluminescent Yellow-Green)
color3  #CCFF00
color11 #EAFF66

# blue & bright blue (Deep Ambient Blue)
color4  #0A7EFA
color12 #66B2FF

# magenta & bright magenta (Y2K Translucent Techno Purple)
color5  #BD00FF
color13 #E879F9

# cyan & bright cyan (Aquatic Cyan - Primary Accent 1)
color6  #00FFFF
color14 #70FFFF

# white & bright white (Muted Silver-Blue & Pure White)
